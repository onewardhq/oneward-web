<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Oneward — The AI-native HRIS</title>
<meta name="description" content="The AI-readiness layer for Workday, SuccessFactors, and Oracle HCM tenants. We audit your tenant and ship the operating layer that makes agents safe to deploy on the systems you already run." />

<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/jetbrains-mono-800.woff2" />

<style>
  /* ── Self-hosted fonts (Latin subset, font-display: swap) ── */
  @font-face { font-family:"Geist"; font-style:normal; font-weight:400; font-display:swap;
    src:url('/fonts/geist-400.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"Geist"; font-style:normal; font-weight:500; font-display:swap;
    src:url('/fonts/geist-500.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"Geist"; font-style:normal; font-weight:600; font-display:swap;
    src:url('/fonts/geist-600.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"JetBrains Mono"; font-style:normal; font-weight:500; font-display:swap;
    src:url('/fonts/jetbrains-mono-500.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"JetBrains Mono"; font-style:normal; font-weight:800; font-display:swap;
    src:url('/fonts/jetbrains-mono-800.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"Instrument Serif"; font-style:normal; font-weight:400; font-display:swap;
    src:url('/fonts/instrument-serif-400.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family:"Instrument Serif"; font-style:italic; font-weight:400; font-display:swap;
    src:url('/fonts/instrument-serif-400-italic.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }

  /* ── Tokens ── */
  :root {
    --bg:#FFFFFF;
    --surface:#F4F6FA;
    --text-1:#081425;
    --text-2:#3D4F6B;
    --text-3:#7A8BA8;
    --border:#E2E6EE;
    --cyan:#00C2FF;
    --violet:#7C5CFC;
    --green:#10B981;
    --red:#FF5C5C;
    --accent:#1E3A5F;
    --accent-hover:#162D4A;
    --danger:#B22B1F;
    --radius:5px;
    --container:1200px;
    --pad-x:clamp(20px, 4vw, 48px);
    --section-y:clamp(88px, 11vw, 136px);
  }

  /* ── Global reset ── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  img, svg { display: block; max-width: 100%; }
  ::selection { background: rgba(0, 194, 255, 0.25); color: var(--text-1); }
  :focus { outline: none; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 1px; }

  .frame { min-height: 100vh; display: flex; flex-direction: column; }
  .container { width: 100%; max-width: var(--container); margin: 0 auto; padding-inline: var(--pad-x); }
  .mono { font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace; }
  .serif { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; }

  h1, h2, h3 { margin: 0; color: var(--text-1); letter-spacing: -0.012em; }
  p { margin: 0; color: var(--text-2); }

  /* ── Shared header / footer ── */
  .site-header {
    position: relative;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .site-header .row {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.22em;
    color: var(--text-1);
  }
  .header-back {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    transition: color 160ms ease;
  }
  .header-back:hover { color: var(--text-1); }

  .site-footer {
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .site-footer .row {
    min-height: 64px;
    padding: 18px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .site-footer .left,
  .site-footer .right {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .site-footer .right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .site-footer .right .mail {
    color: var(--cyan);
    text-transform: none;
    letter-spacing: 0.04em;
    font-size: 13px;
    transition: color 160ms ease;
  }
  .site-footer .right .mail:hover { color: var(--text-1); }
  .site-footer .right .seed {
    color: var(--text-3);
    font-size: 11px;
    letter-spacing: 0.16em;
    transition: color 160ms ease;
  }
  .site-footer .right .seed:hover { color: var(--text-1); }
  @media (max-width: 640px) {
    .site-footer .right { flex-direction: column; align-items: flex-start; gap: 12px; }
  }

  /* ── Shared primary button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 48px;
    padding: 0 22px;
    border-radius: var(--radius);
    background: var(--text-1);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.003em;
    border: 1px solid var(--text-1);
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      0 1px 2px rgba(8, 20, 37, 0.12),
      0 8px 24px -8px rgba(8, 20, 37, 0.16);
  }
  .btn:hover:not(:disabled) {
    background: #15243a;
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.10),
      0 2px 4px rgba(8, 20, 37, 0.16),
      0 14px 34px -10px rgba(8, 20, 37, 0.24);
  }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn .arrow { display: inline-block; transition: transform .15s ease; }
  .btn:hover:not(:disabled) .arrow { transform: translateX(3px); }

  .eyebrow {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  /* ───────────────────────────────────────────────
     PARTNER VIEW — getoneward.com/
     ─────────────────────────────────────────────── */
  .v-partner h1 {
    font-size: clamp(40px, 7.2vw, 84px);
    font-weight: 600;
    line-height: 1.05;
    letter-spacing: -0.022em;
  }
  .v-partner h2 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
    max-width: 22ch;
  }
  .v-partner h3 {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.005em;
  }

  .v-partner .hero {
    position: relative;
    isolation: isolate;
    background: #fff;
    overflow: hidden;
    padding: clamp(72px, 10vw, 128px) 0 clamp(96px, 12vw, 152px);
  }
  .v-partner .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right,  rgba(226, 230, 238, 0.45) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(226, 230, 238, 0.45) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 60%, transparent 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 60%, transparent 95%);
    pointer-events: none;
    z-index: -2;
  }
  .v-partner .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      62% 56% at 72% 42%,
      rgba(244, 246, 250, 0.85) 0%,
      rgba(244, 246, 250, 0.35) 35%,
      rgba(244, 246, 250, 0)    72%
    );
    pointer-events: none;
    z-index: -1;
  }
  .v-partner .hero .container { position: relative; z-index: 1; }
  .v-partner .hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: clamp(40px, 6vw, 72px);
    align-items: start;
  }
  @media (min-width: 1024px) {
    .v-partner .hero-grid {
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
      gap: 80px;
    }
  }
  .v-partner .hero h1 { margin-top: 22px; max-width: 14ch; }
  .v-partner .hero .sub {
    margin-top: 28px;
    font-size: clamp(18px, 1.6vw, 22px);
    line-height: 1.4;
    color: var(--text-1);
    font-weight: 400;
    max-width: 32ch;
    letter-spacing: -0.005em;
  }
  .v-partner .hero .body {
    margin-top: 22px;
    font-size: 16px;
    line-height: 1.62;
    color: var(--text-2);
    max-width: 56ch;
  }
  .v-partner .hero .cta-row {
    margin-top: 36px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 28px;
  }

  /* ── Partner org panel ── */
  .v-partner .org-panel {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    overflow: hidden;
    box-shadow:
      0 1px 2px rgba(8, 20, 37, 0.04),
      0 16px 48px -12px rgba(8, 20, 37, 0.08);
  }
  .v-partner .org-canvas {
    padding: clamp(28px, 4vw, 48px);
    background: radial-gradient(70% 65% at 50% 50%, #FAFBFD 0%, #ffffff 75%);
  }
  .v-partner .org-canvas svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }
  .v-partner .org-canvas text.node-label {
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    paint-order: stroke fill;
    stroke: #fff;
    stroke-width: 4px;
    stroke-linejoin: round;
  }
  .v-partner .org-canvas text.lbl-human { fill: var(--text-1); }
  .v-partner .org-canvas text.lbl-agent { fill: var(--cyan); }
  .v-partner .org-foot {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px clamp(28px, 4vw, 48px);
    border-top: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .v-partner .org-foot .item { display: inline-flex; align-items: center; gap: 9px; }
  .v-partner .org-foot .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--text-1); display: inline-block;
  }
  .v-partner .org-foot .dia {
    width: 9px; height: 9px;
    border: 1px solid var(--cyan);
    transform: rotate(45deg);
    display: inline-block;
  }

  /* ── Section band ── */
  .v-partner .band {
    padding: var(--section-y) 0;
  }
  .v-partner .band.surface {
    background: var(--surface);
  }
  .v-partner .band.surface[aria-labelledby="problem-h"] {
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(232, 236, 244, 0.9) 0%, rgba(244, 246, 250, 0) 60%),
      var(--surface);
  }
  .v-partner .band.surface[aria-labelledby="cohort-h"] {
    background:
      radial-gradient(70% 80% at 18% 100%, rgba(232, 236, 244, 0.95) 0%, rgba(244, 246, 250, 0) 65%),
      var(--surface);
  }
  .v-partner .band-head { margin-bottom: clamp(40px, 5vw, 64px); max-width: 38ch; }
  .v-partner .band-head .eyebrow { margin-bottom: 18px; display: block; }

  /* ── 3-up grid ── */
  .v-partner .three-up {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 36px 40px;
  }
  @media (min-width: 768px) {
    .v-partner .three-up { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 40px; }
  }
  .v-partner .col h3 { margin-bottom: 12px; }
  .v-partner .col .num {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-bottom: 18px;
    display: block;
  }
  .v-partner .col p { font-size: 15px; line-height: 1.6; }

  /* ── Wedge split layout ── */
  .v-partner .split {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: clamp(40px, 5vw, 72px);
    align-items: start;
  }
  @media (min-width: 1024px) {
    .v-partner .split { grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr); gap: 72px; }
  }
  .v-partner .split-text p { max-width: 50ch; }
  .v-partner .split-text .dims {
    list-style: none;
    margin: 26px 0 0;
    padding: 0;
    display: grid;
    gap: 16px;
    font-size: 15px;
  }
  .v-partner .split-text .dims li { color: var(--text-2); line-height: 1.55; }
  .v-partner .split-text .dims li strong {
    color: var(--text-1);
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* ── Console mockup ── */
  .v-partner .console {
    background: var(--text-1);
    border-radius: 8px;
    border: 1px solid #11203a;
    overflow: hidden;
    width: 100%;
    min-width: 0;
    position: relative;
    box-shadow:
      0 24px 60px -32px rgba(8, 20, 37, 0.45),
      0 24px 64px -16px rgba(8, 20, 37, 0.12),
      48px 24px 96px -28px rgba(0, 194, 255, 0.12);
  }
  .v-partner .console-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid #11203a;
    background: #0a1828;
  }
  .v-partner .console-bar .lights { display: flex; gap: 6px; }
  .v-partner .console-bar .lights span {
    width: 10px; height: 10px; border-radius: 50%;
    background: #1d2c44;
  }
  .v-partner .console-bar .title {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #5a72a0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .v-partner .console-bar .title .short { display: none; }
  @media (max-width: 640px) {
    .v-partner .console-bar .title .full  { display: none; }
    .v-partner .console-bar .title .short { display: inline; }
  }
  .v-partner .console-body {
    padding: 24px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 14px;
    line-height: 1.6;
    color: #B8C6DE;
    overflow: hidden;
  }
  @media (max-width: 1024px) { .v-partner .console-body { font-size: 13px; } }
  @media (max-width: 640px)  { .v-partner .console-body { font-size: 12px; padding: 16px; } }
  @media (max-width: 360px)  { .v-partner .console-body { font-size: 11px; padding: 14px; } }
  .v-partner .console-body .line {
    display: block;
    padding-left: 16px;
    text-indent: -16px;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  @media (max-width: 360px) { .v-partner .console-body .line { padding-left: 12px; text-indent: -12px; } }
  .v-partner .console-body .prompt { color: #4d6790; user-select: none; }
  .v-partner .console-body .key    { color: #5e7aab; }
  .v-partner .console-body .val    { color: #B8C6DE; }
  .v-partner .console-body .num    { color: var(--cyan); font-weight: 500; }
  .v-partner .console-body .ok     { color: var(--green); }
  .v-partner .console-body .gap    { color: var(--red); }
  .v-partner .console-body .accent { color: var(--violet); }
  .v-partner .console-body .score  {
    color: var(--cyan);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .v-partner .console-body .pending {
    color: #5a72a0;
    font-style: italic;
  }
  .v-partner .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    margin-left: 2px;
    background: var(--cyan);
    vertical-align: -2px;
    animation: blink 1.05s steps(2, end) infinite;
  }
  @keyframes blink { 50% { background: transparent; } }
  @media (prefers-reduced-motion: reduce) {
    .v-partner .cursor { animation: none; }
  }

  /* ── Criteria grid (Who it's for) ── */
  .v-partner .criteria { display: grid; gap: 36px 40px; grid-template-columns: minmax(0, 1fr); }
  @media (min-width: 768px) {
    .v-partner .criteria { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 40px; }
  }
  .v-partner .criterion {
    padding-top: 26px;
    border-top: 1px solid var(--border);
  }
  .v-partner .criterion .label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
    display: block;
  }
  .v-partner .criterion h3 { margin-bottom: 10px; font-size: 18px; }
  .v-partner .criterion p { font-size: 15px; line-height: 1.55; }
  .v-partner .cohort-note {
    margin-top: clamp(40px, 5vw, 64px);
    max-width: 60ch;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-2);
  }

  /* ── CTA band ── */
  .v-partner .cta-band {
    padding: clamp(64px, 8vw, 96px) 0;
    background: linear-gradient(180deg, #E8ECF3 0%, var(--surface) 100%);
    border-top: 1px solid var(--border);
  }
  .v-partner .cta-band h2 { max-width: 18ch; }
  .v-partner .cta-band p  { margin-top: 14px; max-width: 48ch; font-size: 16px; }
  .v-partner .cta-band .cta-row { margin-top: 32px; }

  @media (max-width: 640px) {
    .v-partner .org-panel {
      box-shadow:
        0 1px 2px rgba(8, 20, 37, 0.04),
        0 8px 24px -10px rgba(8, 20, 37, 0.08);
    }
    .v-partner .console {
      box-shadow:

  /* ───────────────────────────────────────────────
     SEED VIEW — getoneward.com/seed
     ─────────────────────────────────────────────── */
  .v-seed main.app, .v-request-deck main.app { flex: 1 0 auto; }
  .v-seed .hero { padding: 80px 0 88px; }
  .v-seed .hero .grid {

  .v-seed .hero .eyebrow { display: block; margin-bottom: 32px; }

  /* Seed/RequestDeck shared org panel (React OrgChart from loose file) */
  .v-seed .org, .v-request-deck .org {

  .v-seed .org-canvas, .v-request-deck .org-canvas {

  .v-seed .org-canvas svg, .v-request-deck .org-canvas svg {

  }
  .v-seed .org-foot, .v-request-deck .org-foot {
    display: flex; align-items: center; gap: 24px;

  @media (max-width: 720px) {

  .v-seed .org-foot .item, .v-request-deck .org-foot .item { display: inline-flex; align-items: center; gap: 8px; }
  .v-seed .org-foot .lh, .v-request-deck .org-foot .lh { width: 10px; height: 10px; border-radius: 50%; background: var(--text-1); display: inline-block; }
  .v-seed .org-foot .la, .v-request-deck .org-foot .la { width: 9px; height: 9px; background: transparent; border: 1px solid var(--accent); transform: rotate(45deg); display: inline-block; }

  /* ───────────────────────────────────────────────
     REQUEST-DECK VIEW — getoneward.com/seed/request-deck

  .v-request-deck .gate { padding-block: 72px 96px; max-width: 640px; margin: 0 auto; }
  .v-request-deck .gate h2 {

  .v-request-deck .gate .subcopy { color: var(--text-2); font-size: 16px; margin-bottom: 48px; max-width: 48ch; }

  .v-request-deck .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .v-request-deck .field > label {
    font-family: "JetBrains Mono", monospace; font-size: 11px;

  .v-request-deck .field > label .req { color: var(--accent); margin-left: 4px; }

  .v-request-deck .input {
    height: 48px; width: 100%; background: transparent; border: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 0 4px; font-size: 16px; color: var(--text-1);

  .v-request-deck .radio-group {

  .v-request-deck .radio {

  .v-request-deck .radio:last-child { border-right: 0; }
  .v-request-deck .radio input { position: absolute; opacity: 0; pointer-events: none; }
  .v-request-deck .radio .mark {

  .v-request-deck .radio:hover .mark { border-color: var(--text-2); }
  .v-request-deck .radio[data-checked="true"] { background: var(--text-1); color: var(--bg); }
  .v-request-deck .radio[data-checked="true"] .mark { border-color: var(--bg); }
  .v-request-deck .radio[data-checked="true"] .mark::after {

  .v-request-deck .radio:focus-within { outline: 2px solid var(--accent); outline-offset: -2px; }

  .v-request-deck .field .err {

    display: inline-flex; align-items: center;
  }
  .v-request-deck .back-link:hover { color: var(--text-1); }

  .v-request-deck .alert {
    padding: 14px 16px; border: 1px solid var(--border); background: var(--surface);
    margin: 8px 0; font-size: 14px; color: var(--text-1);
    display: flex; align-items: center; gap: 12px; border-radius: 4px;
  }
  .v-request-deck .alert .tag {
    font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--danger);
    border: 1px solid currentColor; padding: 2px 6px; border-radius: 2px;
  }

  .v-request-deck .thanks-body { font-size: 16px; line-height: 1.55; color: var(--text-2); max-width: 52ch; margin: 0 0 12px; }
  .v-request-deck .thanks-fallback { margin-top: 16px; font-size: 14px; line-height: 1.55; color: var(--text-3); max-width: 52ch; }
</style>

<body>
<div id="root"></div>

<script>
  window.ONEWARD_CONFIG = {
    appsScriptUrl: "",
    scriptSecret:  "",
    recipient:     "deck.access@getoneward.com",
    siteName:      "getoneward.com"
  };
</script>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useLayoutEffect } = React;
const CFG = window.ONEWARD_CONFIG;

/* ── Routing ── */
const routeFromPath = (p) => {
  if (p === "/seed/request-deck" || p === "/seed/request-deck/") return "request-deck";
  if (p === "/seed" || p === "/seed/") return "seed";
  return "partner";
};

/* ── Validation helpers (ported verbatim from production /Oneward/index.html) ── */
const BLOCKED_EMAIL_DOMAINS = [
  "gmail.com","googlemail.com",
  "yahoo.com","yahoo.co.uk","yahoo.fr","yahoo.de","ymail.com","rocketmail.com",
  "deel.com","letsdeel.com",
  "trading212.com","t212.com","trading-212.com",
  "personio.com","personio.de",
  "hibob.com","hibob.io","bob.io",
  "workday.com","myworkday.com",
  "successfactors.com","sfsf.com",
  "remote.com"
];
const BLOCKED_NAME_FRAGMENTS = [
  "ashminov","ashminoff","ashminow","ashminof",
  "ashmenov","ashmanov","ashmynov","ashmonov",
  "aschminov","aschminow","achminov","achminow",
  "asminov","asminoff","asminow","asmenov","asmanov","asmynov",
  "ashmnov","ashmnv","ashmiov","ashmino","ashminv",
  "bouaziz","bouazize","bouazis","bouazz","bouazze","bouazyz",
  "bouhaziz","bouwaziz","bouhazis",
  "boaziz","boazis","boazize","buaziz","buazis","buazize","bwaziz",
  "bouazi","bouaiz",
  "westgarth","westgarh","westgart","westgath","westgard","westgardh",
  "westgrth","wesgarth","wsgarth","wstgarth","wstgrth"
];

const normalize = (s) =>
  (s || "").toLowerCase().normalize("NFD").replace(/\p{M}/gu, "").replace(/[\s.\-_']/g, "");

function evaluateSubmission(form) {
  if (form.company_size && form.company_size.length > 0) return { blocked: true, reason: "honeypot" };
  const email = (form.email || "").trim().toLowerCase();
  const at = email.lastIndexOf("@");
  const domain = at >= 0 ? email.slice(at + 1) : "";
  if (BLOCKED_EMAIL_DOMAINS.includes(domain)) return { blocked: true, reason: "email_domain" };
  const nEmail = normalize(email);
  const nName = normalize(form.name);
  for (const f of BLOCKED_NAME_FRAGMENTS) {
    if (nEmail.includes(f)) return { blocked: true, reason: "email_name_match" };
    if (nName.includes(f))  return { blocked: true, reason: "name_match" };
  }
  return { blocked: false, reason: "" };
}

async function submitGate(form, verdict) {
  if (!CFG.appsScriptUrl) return;
  try {
    await fetch(CFG.appsScriptUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        secret: CFG.scriptSecret,
        event_type: "gate_submit",
        timestamp: new Date().toISOString(),
        user_agent: navigator.userAgent,
        name: form.name, email: form.email, investor_type: form.investor_type,
        fund_name: form.fund_name || "", fund_website: form.fund_website || "",
        linkedin: form.linkedin || "", current_role: form.current_role || "",
        blocked: verdict.blocked, block_reason: verdict.reason || ""
      })
    });
  } catch (e) {}
}

function buildMailto(form) {
  const subject = `Oneward — deck access request — ${form.name.trim()}`;
  const lines = [];
  lines.push("Hello,");
  lines.push("");
  lines.push("Please send me the Oneward Seed Round deck.");
  lines.push("");
  lines.push(`Name: ${form.name.trim()}`);
  lines.push(`Work email: ${form.email.trim()}`);
  lines.push(`Investor type: ${form.investor_type === "vc" ? "VC fund" : "Angel investor"}`);
  if (form.investor_type === "vc") {
    lines.push(`Fund: ${form.fund_name.trim()}`);
    lines.push(`Fund website: ${form.fund_website.trim()}`);
  } else {
    lines.push(`LinkedIn: ${form.linkedin.trim()}`);
    lines.push(`Current role: ${form.current_role.trim()}`);
  }
  lines.push("");
  lines.push(`Submitted via ${CFG.siteName}`);
  const body = lines.join("\n");
  const encodedBody = encodeURIComponent(body).replace(/%0A/g, "%0D%0A");
  const encodedSubject = encodeURIComponent(subject);
  return `mailto:${CFG.recipient}?subject=${encodedSubject}&body=${encodedBody}`;
}

/* ── Org chart (Seed view) ── */
const DESKTOP = {
  W: 600, H: 380, C: [75, 225, 375, 525],
  L1x: 300, L1y: 30, Y_BUS1: 85, Y_L2: 140, Y_L3: 235, Y_BUS3: 282, Y_L4: 330,
  FLANK: 60, FONT: 12, WRAP: false, LABEL_OFFSET: 22
};
const MOBILE = {
  W: 400, H: 580, C: [50, 150, 250, 350],
  L1x: 200, L1y: 38, Y_BUS1: 105, Y_L2: 168, Y_L3: 308, Y_BUS3: 372, Y_L4: 432,
  FLANK: 45, FONT: 13, WRAP: true, LABEL_OFFSET: 22
};
const R_H = 5, R_A = 5.5;
const E_STROKE = "#7A8BA8", E_OPACITY = 0.3;

function buildGraph(L) {
  const L1 = { id: "ceo", x: L.L1x, y: L.L1y, t: "h", label: "CEO" };
  const L2 = [
    { id: "cfo",  x: L.C[0], y: L.Y_L2, t: "h", label: "CFO" },
    { id: "cto",  x: L.C[1], y: L.Y_L2, t: "h", label: "CTO" },
    { id: "cclo", x: L.C[2], y: L.Y_L2, t: "h", label: "CHIEF COUNSEL" },
    { id: "hops", x: L.C[3], y: L.Y_L2, t: "a", label: "HEAD OF OPS" }
  ];
  const L3 = [
    { id: "finmgr", x: L.C[0], y: L.Y_L3, t: "h", label: "FINANCE MGR" },
    { id: "engmgr", x: L.C[1], y: L.Y_L3, t: "a", label: "ENG MGR" },
    { id: "para",   x: L.C[2], y: L.Y_L3, t: "a", label: "PARALEGAL" },
    { id: "olead",  x: L.C[3], y: L.Y_L3, t: "h", label: "OPS LEAD" }
  ];
  const ENG_X = L.C[1], OPS_X = L.C[3];
  const L4 = [
    { id: "beng", x: ENG_X - L.FLANK, y: L.Y_L4, t: "h", label: "BACKEND ENG" },
    { id: "crev", x: ENG_X + L.FLANK, y: L.Y_L4, t: "a", label: "CODE REVIEWER" },
    { id: "pmgr", x: OPS_X - L.FLANK, y: L.Y_L4, t: "h", label: "PAYROLL MGR" },
    { id: "bbot", x: OPS_X + L.FLANK, y: L.Y_L4, t: "a", label: "BENEFITS BOT" }
  ];
  return { L1, L2, L3, L4, ALL: [L1, ...L2, ...L3, ...L4], ENG_X, OPS_X };
}
const topOf = (n) => n.y - (n.t === "h" ? R_H : R_A);
const botOf = (n) => n.y + (n.t === "h" ? R_H : R_A);

function wrapLabel(t) {
  const w = t.split(/\s+/);
  if (w.length <= 1) return [t];
  if (w.length === 2) return w;
  return [w.slice(0, 2).join(" "), w.slice(2).join(" ")];
}

function NodeLabel({ x, y, text, color, fontSize, wrap, labelOffset, registerBox }) {
  const ref = useRef(null);
  const lines = wrap ? wrapLabel(text) : [text];
  useLayoutEffect(() => {
    if (ref.current) {
      const b = ref.current.getBBox();
      registerBox({ x: b.x - 4, y: b.y - 2, width: b.width + 8, height: b.height + 4 });
    }
  }, [text, x, y, fontSize, wrap, labelOffset]);
  return (
    <text ref={ref} x={x} y={y + labelOffset}
      textAnchor="middle" dominantBaseline="hanging"
      fontFamily='"Geist", ui-sans-serif, system-ui, sans-serif'
      fontSize={fontSize} fontWeight={500} letterSpacing="0.05em"
      style={{ textTransform: "uppercase" }} fill={color}>
      {lines.map((ln, i) => <tspan key={i} x={x} dy={i === 0 ? 0 : fontSize + 2}>{ln}</tspan>)}
    </text>
  );
}

function ChartBody({ L }) {
  const { L1, L2, L3, L4, ALL, ENG_X, OPS_X } = buildGraph(L);
  const [boxes, setBoxes] = useState({});
  const register = (id) => (b) => setBoxes((m) => {
    const p = m[id];
    if (p && p.x === b.x && p.y === b.y && p.width === b.width && p.height === b.height) return m;
    return { ...m, [id]: b };
  });
  return (
    <svg viewBox={`0 0 ${L.W} ${L.H}`} preserveAspectRatio="xMidYMid meet" role="img" aria-hidden="true">
      <line x1={L1.x} y1={botOf(L1)} x2={L1.x} y2={L.Y_BUS1} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L.C[0]} y1={L.Y_BUS1} x2={L.C[L.C.length - 1]} y2={L.Y_BUS1} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      {L2.map((n) => (<line key={`d2-${n.id}`} x1={n.x} y1={L.Y_BUS1} x2={n.x} y2={topOf(n)} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      {L2.map((p, i) => (<line key={`v-${p.id}`} x1={p.x} y1={botOf(p)} x2={p.x} y2={topOf(L3[i])} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      <line x1={ENG_X} y1={botOf(L3[1])} x2={ENG_X} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L4[0].x} y1={L.Y_BUS3} x2={L4[1].x} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={OPS_X} y1={botOf(L3[3])} x2={OPS_X} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L4[2].x} y1={L.Y_BUS3} x2={L4[3].x} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      {L4.map((n) => (<line key={`d4-${n.id}`} x1={n.x} y1={L.Y_BUS3} x2={n.x} y2={topOf(n)} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      {ALL.map((n) => boxes[n.id] && (
        <rect key={`r-${n.id}`} x={boxes[n.id].x} y={boxes[n.id].y} width={boxes[n.id].width} height={boxes[n.id].height} fill="var(--bg)" stroke="none" />
      ))}
      {ALL.map((n) => n.t === "h" ? (
        <circle key={n.id} cx={n.x} cy={n.y} r={R_H} fill="var(--text-1)" />
      ) : (
        <polygon key={n.id} points={`${n.x},${n.y - R_A} ${n.x + R_A},${n.y} ${n.x},${n.y + R_A} ${n.x - R_A},${n.y}`}
          fill="var(--bg)" stroke="var(--accent)" strokeWidth={1.25} />
      ))}
      {ALL.map((n) => (
        <NodeLabel key={`l-${n.id}`} x={n.x} y={n.y} text={n.label}
          color={n.t === "h" ? "var(--text-1)" : "var(--accent)"}
          fontSize={L.FONT} wrap={L.WRAP} labelOffset={L.LABEL_OFFSET}
          registerBox={register(n.id)} />
      ))}
    </svg>
  );
}

function OrgChart() {
  const [narrow, setNarrow] = useState(() =>
    typeof window === "undefined" ? false : window.matchMedia("(max-width: 1023.98px)").matches);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 1023.98px)");
    const onChange = (e) => setNarrow(e.matches);
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener("change", onChange);
      else mq.removeListener(onChange);
    };
  }, []);
  const L = narrow ? MOBILE : DESKTOP;
  return (
    <aside className="org" aria-label="Permissioned company graph">
      <div className="org-canvas">
        <ChartBody key={narrow ? "narrow" : "wide"} L={L} />
      </div>
      <div className="org-foot">
        <span className="item"><span className="lh" aria-hidden="true"></span>HUMAN</span>
        <span className="item"><span className="la" aria-hidden="true"></span>AGENT</span>
      </div>
    </aside>
  );
}

/* ── Header / Footer ── */
function Header({ view, go }) {
  return (
    <header className="site-header">
      <div className="container row">
        <a className="wordmark" href="/" onClick={(e) => { e.preventDefault(); go("/"); }} aria-label="Oneward — home">ONEWARD</a>
        {(view === "seed" || view === "request-deck") && (
          <a className="header-back" href="/" onClick={(e) => { e.preventDefault(); go("/"); }}>← Home</a>
        )}
      </div>
    </header>
  );

/* ── Request-deck view (/seed/request-deck) ── */
function RequestDeck({ go }) {
  const [form, setForm] = useState({
    name: "", email: "", investor_type: "",
    fund_name: "", fund_website: "", linkedin: "", current_role: "",
    company_size: ""
  });
  const [touched, setTouched] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [globalError, setGlobalError] = useState("");
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const blur = (k) => () => setTouched((t) => ({ ...t, [k]: 1 }));

  const errors = useMemo(() => {
    const e = {};
    if (!form.name.trim())  e.name  = "required";
    if (!form.email.trim()) e.email = "required";
    else if (!/^\S+@\S+\.\S+$/.test(form.email.trim())) e.email = "invalid email";
    if (!form.investor_type) e.investor_type = "required";
    if (form.investor_type === "vc") {
      if (!form.fund_name.trim()) e.fund_name = "required";
      if (!form.fund_website.trim()) e.fund_website = "required";
    }
    if (form.investor_type === "angel") {
      if (!form.linkedin.trim() || !form.linkedin.toLowerCase().includes("linkedin.com/")) e.linkedin = "include linkedin.com/...";
      if (!form.current_role.trim()) e.current_role = "required";
    }
    return e;
  }, [form]);
  const showField = (n) => touched[n] && errors[n];

  const onSubmit = (e) => {
    e.preventDefault();
    setTouched({ name: 1, email: 1, investor_type: 1, fund_name: 1, fund_website: 1, linkedin: 1, current_role: 1 });
    if (Object.keys(errors).length > 0) return;
    setGlobalError("");
    const verdict = evaluateSubmission(form);
    setSubmitting(true);
    submitGate(form, verdict);
    if (verdict.blocked) {
      setSubmitting(false);
      setGlobalError("Access is not available at this time.");
      return;
    }
    window.location.href = buildMailto(form);
    setSubmitted(true);
    setSubmitting(false);
  };

  if (submitted) {
    return (
      <main className="app">
        <section className="gate container">
          <span className="eyebrow">SEED ROUND · 2026 · ACCESS</span>
          <h2 className="serif">Thank you.</h2>
          <p className="thanks-body">
            An email is ready in your mail client, addressed to {CFG.recipient}.
          </p>
          <p className="thanks-body">Send it and we'll reply with the deck shortly.</p>
          <p className="thanks-fallback">If nothing opened, email {CFG.recipient} directly.</p>
        </section>
      </main>
    );
  }

  return (
    <main className="app">
      <section className="gate container">
        <span className="eyebrow">SEED ROUND · 2026 · ACCESS</span>
        <h2 className="serif">Request access</h2>
        <p className="subcopy">A few details so we know who you are.</p>

        <form onSubmit={onSubmit} noValidate>
          <div className="field">
            <label htmlFor="name">Full name<span className="req">*</span></label>
            <input id="name" className={"input " + (showField("name") ? "error" : "")}
              type="text" autoComplete="name" value={form.name}
              onChange={set("name")} onBlur={blur("name")} />
            {showField("name") && <span className="err">{errors.name}</span>}
          </div>

          <div className="field">
            <label htmlFor="email">Work email<span className="req">*</span></label>
            <input id="email" className={"input " + (showField("email") ? "error" : "")}
              type="email" inputMode="email" autoComplete="email" value={form.email}
              onChange={set("email")} onBlur={blur("email")} />
            {showField("email") && <span className="err">{errors.email}</span>}
          </div>

          <div className="field">
            <label>Investor type<span className="req">*</span></label>
            <div className="radio-group" role="radiogroup" aria-label="Investor type">
              {[{ v: "vc", l: "VC fund" }, { v: "angel", l: "Angel investor" }].map((opt) => (
                <label key={opt.v} className="radio" data-checked={form.investor_type === opt.v}>
                  <input type="radio" name="investor_type" value={opt.v}
                    checked={form.investor_type === opt.v}
                    onChange={(e) => setForm((f) => ({ ...f, investor_type: e.target.value }))} />
                  <span className="mark" aria-hidden="true"></span>
                  <span>{opt.l}</span>
                </label>
              ))}
            </div>
            {showField("investor_type") && <span className="err">{errors.investor_type}</span>}
          </div>

          {form.investor_type === "vc" && (
            <>
              <div className="field">
                <label htmlFor="fund_name">Fund name<span className="req">*</span></label>
                <input id="fund_name" className={"input " + (showField("fund_name") ? "error" : "")}
                  type="text" value={form.fund_name}
                  onChange={set("fund_name")} onBlur={blur("fund_name")} />
                {showField("fund_name") && <span className="err">{errors.fund_name}</span>}
              </div>
              <div className="field">
                <label htmlFor="fund_website">Fund website<span className="req">*</span></label>
                <input id="fund_website" className={"input " + (showField("fund_website") ? "error" : "")}
                  type="text" inputMode="url" autoComplete="url" value={form.fund_website}
                  onChange={set("fund_website")} onBlur={blur("fund_website")} />
                {showField("fund_website") && <span className="err">{errors.fund_website}</span>}
              </div>
            </>
          )}

          {form.investor_type === "angel" && (
            <>
              <div className="field">
                <label htmlFor="linkedin">LinkedIn URL<span className="req">*</span></label>
                <input id="linkedin" className={"input " + (showField("linkedin") ? "error" : "")}
                  type="text" inputMode="url" placeholder="linkedin.com/in/..."
                  value={form.linkedin} onChange={set("linkedin")} onBlur={blur("linkedin")} />
                {showField("linkedin") && <span className="err">{errors.linkedin}</span>}
              </div>
              <div className="field">
                <label htmlFor="current_role">Current role and company<span className="req">*</span></label>
                <input id="current_role" className={"input " + (showField("current_role") ? "error" : "")}
                  type="text" value={form.current_role}
                  onChange={set("current_role")} onBlur={blur("current_role")} />
                {showField("current_role") && <span className="err">{errors.current_role}</span>}
              </div>
            </>
          )}

          <input type="text" name="company_size" value={form.company_size}
            onChange={set("company_size")} tabIndex={-1} autoComplete="off" aria-hidden="true"
            style={{ position: "absolute", left: "-9999px", width: "1px", height: "1px" }} />

          {globalError && (
            <div className="alert" role="alert">
              <span className="tag">Notice</span>
              <span>{globalError}</span>
            </div>
          )}

          <div className="submit-row">
            <button className="btn" type="submit" disabled={submitting}>
              {submitting ? "Submitting…" : <>Continue <span className="arrow" aria-hidden="true">→</span></>}
            </button>
            <button type="button" className="back-link" onClick={() => go("/seed")}>← Back</button>
          </div>
          <p className="micro">Your information is used only to share the deck and follow up directly.</p>
        </form>
      </section>
    </main>
  );
}

/* ── App + routing ──
   pushState is wrapped in try/catch because under file:// (opening index.html
   directly) Chrome throws SecurityError on absolute paths. In that case we
   still update React state so the view changes, even if the URL bar can't. */
function App() {
  const [route, setRoute] = useState(() => routeFromPath(window.location.pathname));
  const go = (path) => {
    if (window.location.pathname !== path) {
      try { history.pushState({}, "", path); } catch (e) { /* file:// or sandbox — view still switches */ }
    }
    setRoute(routeFromPath(path));
    window.scrollTo({ top: 0 });
  };
  useEffect(() => {
    const onPop = () => setRoute(routeFromPath(window.location.pathname));
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);
  useEffect(() => {
    document.title = route === "seed" ? "Oneward — Seed Round 2026"
                   : route === "request-deck" ? "Oneward — Request deck access"
                   : "Oneward — The AI-native HRIS";
  }, [route]);
  return (
    <div className={"frame v-" + route}>
      <Header view={route} go={go} />
      {route === "partner" && <Partner go={go} />}
      {route === "seed" && <Seed go={go} />}
      {route === "request-deck" && <RequestDeck go={go} />}
      <Footer view={route} go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
