<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Oneward</title>
<meta name="description" content="Enterprise HR software for a workforce of humans and agents." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page:#FFFFFF; --bg-surface:#F4F6FA;
    --text-primary:#0A1628; --text-secondary:#4A5568; --text-muted:#8B95A8;
    --accent:#1E3A5F; --accent-hover:#162D4A;
    --border:#E4E8EE; --danger:#B22B1F;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin:0; padding:0; background:var(--bg-page); color:var(--text-primary); }
  body {
    font-family:"Geist",ui-sans-serif,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility;
  }
  .serif { font-family:"Instrument Serif",Georgia,serif; font-weight:400; }
  a { color:inherit; text-decoration:none; }
  button { font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer; }
  input,select,textarea { font:inherit; color:inherit; }
  ::selection { background:var(--text-primary); color:var(--bg-page); }
  :focus { outline:none; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:1px; }

  .frame { min-height:100vh; display:flex; flex-direction:column; }
  .container { width:100%; max-width:1280px; margin:0 auto; padding:0 48px; }
  @media (max-width:720px) { .container { padding:0 24px; } }

  header.site { border-bottom:1px solid var(--border); background:var(--bg-page); }
  header.site .row { display:flex; align-items:center; justify-content:space-between; padding-block:28px; }
  .wordmark {
    font-family:"JetBrains Mono",monospace; font-weight:500;
    font-size:32px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-primary); line-height:1; min-height:44px;
  }
  @media (max-width:720px) {
    .wordmark { font-size:22px; }
    header.site .row { padding-block:22px; }
  }

  footer.site { border-top:1px solid var(--border); background:var(--bg-page); }
  footer.site .row {
    display:flex; align-items:center; justify-content:space-between; height:56px;
    font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);
  }

  .eyebrow {
    font-family:"JetBrains Mono",monospace; font-size:12px;
    letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted);
  }

  main.app { flex:1 0 auto; }
  .hero { padding:80px 0 88px; }
  .hero .grid {
    display:grid; grid-template-columns:minmax(0,1fr) 540px; grid-template-rows:auto auto;
    column-gap:64px; row-gap:32px; align-items:stretch;
  }
  .hero .grid > .text    { grid-column:1; grid-row:1; min-width:0; }
  .hero .grid > .org     { grid-column:2; grid-row:1; height:100%; }
  .hero .grid > .actions { grid-column:1; grid-row:2; align-self:start; margin-top:8px; }
  @media (max-width:1024px) {
    .hero { padding:56px 0 72px; }
    .hero .grid { grid-template-columns:1fr; grid-template-rows:auto; gap:40px; }
    .hero .grid > .text,.hero .grid > .org,.hero .grid > .actions { grid-column:1; grid-row:auto; height:auto; }
  }

  .hero h1 {
    font-family:"Instrument Serif",Georgia,serif; font-weight:400;
    font-size:88px; line-height:1.0; letter-spacing:-0.005em;
    margin:0; color:var(--text-primary); white-space:nowrap;
  }
  @media (max-width:1280px) { .hero h1 { font-size:80px; } }
  @media (max-width:1024px) { .hero h1 { font-size:60px; white-space:normal; } }
  @media (max-width:720px)  { .hero h1 { font-size:52px; } }
  @media (max-width:400px)  { .hero h1 { font-size:44px; } }

  .hero .eyebrow { margin-bottom:32px; }
  .hero .sub { margin-top:28px; font-size:20px; line-height:1.4; font-weight:500; color:var(--text-primary); max-width:32ch; }
  .hero .body { margin-top:18px; font-size:16px; line-height:1.55; color:var(--text-secondary); max-width:52ch; }
  .hero .actions { margin-top:32px; }

  .btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 24px; min-height:44px;
    border:1px solid var(--accent); background:var(--accent);
    color:#FFFFFF; font-family:"Geist",sans-serif;
    font-size:15px; font-weight:500; line-height:1.2;
    border-radius:4px; white-space:nowrap;
    transition:background 160ms ease, border-color 160ms ease;
  }
  .btn:hover:not(:disabled) { background:var(--accent-hover); border-color:var(--accent-hover); }
  .btn:disabled { opacity:0.6; cursor:default; }
  .btn .arrow { display:inline-block; transition:transform 160ms ease; }
  .btn:hover:not(:disabled) .arrow { transform:translateX(2px); }

  .org { display:flex; flex-direction:column; width:100%; border:1px solid var(--border); background:var(--bg-page); }
  .org-canvas { flex:1; padding:48px; display:flex; align-items:center; justify-content:center; min-height:380px; }
  @media (max-width:720px) { .org-canvas { padding:32px; min-height:380px; } }
  .org-canvas svg { display:block; width:100%; height:100%; overflow:visible; }
  .org-foot {
    display:flex; align-items:center; gap:24px;
    padding:16px 48px; border-top:1px solid var(--border);
    font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);
  }
  @media (max-width:720px) { .org-foot { padding:14px 32px; } }
  .org-foot .item { display:inline-flex; align-items:center; gap:8px; }
  .org-foot .lh { width:10px; height:10px; border-radius:50%; background:var(--text-primary); display:inline-block; }
  .org-foot .la { width:9px; height:9px; background:transparent; border:1px solid var(--accent); transform:rotate(45deg); display:inline-block; }

  .gate { padding-block:72px 96px; max-width:640px; }
  .gate h2 {
    font-family:"Instrument Serif",Georgia,serif; font-weight:400;
    font-size:64px; line-height:1.0; margin:14px 0 14px; color:var(--text-primary);
  }
  @media (max-width:720px) { .gate h2 { font-size:52px; } }
  .gate .subcopy { color:var(--text-secondary); font-size:16px; margin-bottom:48px; max-width:48ch; }

  .field { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
  .field > label {
    font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);
  }
  .field > label .req { color:var(--accent); margin-left:4px; }
  .input {
    height:48px; width:100%; background:transparent; border:0; border-bottom:1px solid var(--border);
    padding:0 0 4px; font-size:16px; color:var(--text-primary);
    transition:border-color 160ms ease, box-shadow 160ms ease;
  }
  .input::placeholder { color:var(--text-muted); }
  .input:hover { border-color:var(--text-secondary); }
  .input:focus { border-color:var(--accent); box-shadow:0 1px 0 var(--accent); outline:none; }
  .input.error { border-color:var(--danger); }

  .radio-group { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .radio {
    position:relative; padding:12px 18px; min-height:44px;
    font-size:15px; color:var(--text-primary); cursor:pointer;
    transition:background 160ms ease, color 160ms ease;
    display:flex; align-items:center; gap:12px;
    border-right:1px solid var(--border); background:var(--bg-page);
  }
  .radio:last-child { border-right:0; }
  .radio input { position:absolute; opacity:0; pointer-events:none; }
  .radio .mark {
    width:14px; height:14px; border:1px solid var(--border); border-radius:50%;
    display:inline-block; flex-shrink:0; transition:border-color 160ms ease; position:relative;
  }
  .radio:hover .mark { border-color:var(--text-secondary); }
  .radio[data-checked="true"] { background:var(--text-primary); color:var(--bg-page); }
  .radio[data-checked="true"] .mark { border-color:var(--bg-page); }
  .radio[data-checked="true"] .mark::after { content:""; position:absolute; inset:3px; background:var(--bg-page); border-radius:50%; }
  .radio:focus-within { outline:2px solid var(--accent); outline-offset:-2px; }

  .field .err { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:0.06em; color:var(--danger); text-transform:uppercase; }
  .micro { font-size:13px; color:var(--text-secondary); margin-top:16px; max-width:56ch; }

  .submit-row { display:flex; flex-direction:column; align-items:stretch; gap:16px; margin-top:8px; }
  .submit-row .btn { width:100%; justify-content:center; }
  .submit-row .back-link { align-self:flex-start; }
  @media (min-width:640px) {
    .submit-row { flex-direction:row; align-items:center; gap:24px; }
    .submit-row .btn { width:auto; justify-content:flex-start; }
  }

  .back-link {
    font-family:"JetBrains Mono",monospace; font-size:11px;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);
    transition:color 160ms ease; min-height:44px;
    display:inline-flex; align-items:center;
  }
  .back-link:hover { color:var(--text-primary); }

  .alert {
    padding:14px 16px; border:1px solid var(--border); background:var(--bg-surface);
    margin:8px 0; font-size:14px; color:var(--text-primary);
    display:flex; align-items:center; gap:12px; border-radius:4px;
  }
  .alert .tag {
    font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--danger);
    border:1px solid currentColor; padding:2px 6px; border-radius:2px;
  }

  .thanks-body { font-size:16px; line-height:1.55; color:var(--text-secondary); max-width:52ch; margin:0 0 12px; }
  .thanks-fallback { margin-top:16px; font-size:14px; line-height:1.55; color:var(--text-muted); max-width:52ch; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.ONEWARD_CONFIG = {
    appsScriptUrl: "",
    scriptSecret:  "",
    recipient:     "deck.access@getoneward.com",
    siteName:      "getoneward.com"
  };
</script>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useLayoutEffect } = React;
const CFG = window.ONEWARD_CONFIG;

const BLOCKED_EMAIL_DOMAINS = [
  "gmail.com","googlemail.com",
  "yahoo.com","yahoo.co.uk","yahoo.fr","yahoo.de","ymail.com","rocketmail.com",
  "deel.com","letsdeel.com",
  "trading212.com","t212.com","trading-212.com",
  "personio.com","personio.de",
  "hibob.com","hibob.io","bob.io",
  "workday.com","myworkday.com",
  "successfactors.com","sfsf.com",
  "remote.com"
];
const BLOCKED_NAME_FRAGMENTS = [
  "ashminov","ashminoff","ashminow","ashminof",
  "ashmenov","ashmanov","ashmynov","ashmonov",
  "aschminov","aschminow","achminov","achminow",
  "asminov","asminoff","asminow","asmenov","asmanov","asmynov",
  "ashmnov","ashmnv","ashmiov","ashmino","ashminv",
  "bouaziz","bouazize","bouazis","bouazz","bouazze","bouazyz",
  "bouhaziz","bouwaziz","bouhazis",
  "boaziz","boazis","boazize","buaziz","buazis","buazize","bwaziz",
  "bouazi","bouaiz",
  "westgarth","westgarh","westgart","westgath","westgard","westgardh",
  "westgrth","wesgarth","wsgarth","wstgarth","wstgrth"
];

const normalize = (s) =>
  (s || "").toLowerCase().normalize("NFD").replace(/\p{M}/gu, "").replace(/[\s.\-_']/g, "");

function evaluateSubmission(form) {
  if (form.company_size && form.company_size.length > 0) return { blocked: true, reason: "honeypot" };
  const email = (form.email || "").trim().toLowerCase();
  const at = email.lastIndexOf("@");
  const domain = at >= 0 ? email.slice(at + 1) : "";
  if (BLOCKED_EMAIL_DOMAINS.includes(domain)) return { blocked: true, reason: "email_domain" };
  const nEmail = normalize(email);
  const nName = normalize(form.name);
  for (const f of BLOCKED_NAME_FRAGMENTS) {
    if (nEmail.includes(f)) return { blocked: true, reason: "email_name_match" };
    if (nName.includes(f))  return { blocked: true, reason: "name_match" };
  }
  return { blocked: false, reason: "" };
}

async function submitGate(form, verdict) {
  if (!CFG.appsScriptUrl) return;
  try {
    await fetch(CFG.appsScriptUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        secret: CFG.scriptSecret,
        event_type: "gate_submit",
        timestamp: new Date().toISOString(),
        user_agent: navigator.userAgent,
        name: form.name, email: form.email, investor_type: form.investor_type,
        fund_name: form.fund_name || "", fund_website: form.fund_website || "",
        linkedin: form.linkedin || "", current_role: form.current_role || "",
        blocked: verdict.blocked, block_reason: verdict.reason || ""
      })
    });
  } catch (e) {}
}

function buildMailto(form) {
  const subject = `Oneward — deck access request — ${form.name.trim()}`;
  const lines = [];
  lines.push("Hello,");
  lines.push("");
  lines.push("Please send me the Oneward Seed Round deck.");
  lines.push("");
  lines.push(`Name: ${form.name.trim()}`);
  lines.push(`Work email: ${form.email.trim()}`);
  lines.push(`Investor type: ${form.investor_type === "vc" ? "VC fund" : "Angel investor"}`);
  if (form.investor_type === "vc") {
    lines.push(`Fund: ${form.fund_name.trim()}`);
    lines.push(`Fund website: ${form.fund_website.trim()}`);
  } else {
    lines.push(`LinkedIn: ${form.linkedin.trim()}`);
    lines.push(`Current role: ${form.current_role.trim()}`);
  }
  lines.push("");
  lines.push(`Submitted via ${CFG.siteName}`);
  const body = lines.join("\n");
  const encodedBody = encodeURIComponent(body).replace(/%0A/g, "%0D%0A");
  const encodedSubject = encodeURIComponent(subject);
  return `mailto:${CFG.recipient}?subject=${encodedSubject}&body=${encodedBody}`;
}

function Header({ onHome }) {
  return (
    <header className="site">
      <div className="container row">
        <button className="wordmark" onClick={onHome} aria-label="Oneward — home">ONEWARD</button>
        <span aria-hidden="true"></span>
      </div>
    </header>
  );
}
function Footer() {
  return (
    <footer className="site">
      <div className="container row">
        <span>ONEWARD · 2026</span>
        <span aria-hidden="true"></span>
      </div>
    </footer>
  );
}

const DESKTOP = {
  W: 600, H: 380, C: [75, 225, 375, 525],
  L1x: 300, L1y: 30, Y_BUS1: 85, Y_L2: 140, Y_L3: 235, Y_BUS3: 282, Y_L4: 330,
  FLANK: 60, FONT: 12, WRAP: false, LABEL_OFFSET: 22
};
const MOBILE = {
  W: 400, H: 580, C: [50, 150, 250, 350],
  L1x: 200, L1y: 38, Y_BUS1: 105, Y_L2: 168, Y_L3: 308, Y_BUS3: 372, Y_L4: 432,
  FLANK: 45, FONT: 13, WRAP: true, LABEL_OFFSET: 22
};
const R_H = 5, R_A = 5.5;
const E_STROKE = "var(--text-muted)", E_OPACITY = 0.3;

function buildGraph(L) {
  const L1 = { id: "ceo", x: L.L1x, y: L.L1y, t: "h", label: "CEO" };
  const L2 = [
    { id: "cfo",  x: L.C[0], y: L.Y_L2, t: "h", label: "CFO" },
    { id: "cto",  x: L.C[1], y: L.Y_L2, t: "h", label: "CTO" },
    { id: "cclo", x: L.C[2], y: L.Y_L2, t: "h", label: "CHIEF COUNSEL" },
    { id: "hops", x: L.C[3], y: L.Y_L2, t: "a", label: "HEAD OF OPS" }
  ];
  const L3 = [
    { id: "finmgr", x: L.C[0], y: L.Y_L3, t: "h", label: "FINANCE MGR" },
    { id: "engmgr", x: L.C[1], y: L.Y_L3, t: "a", label: "ENG MGR" },
    { id: "para",   x: L.C[2], y: L.Y_L3, t: "a", label: "PARALEGAL" },
    { id: "olead",  x: L.C[3], y: L.Y_L3, t: "h", label: "OPS LEAD" }
  ];
  const ENG_X = L.C[1], OPS_X = L.C[3];
  const L4 = [
    { id: "beng", x: ENG_X - L.FLANK, y: L.Y_L4, t: "h", label: "BACKEND ENG" },
    { id: "crev", x: ENG_X + L.FLANK, y: L.Y_L4, t: "a", label: "CODE REVIEWER" },
    { id: "pmgr", x: OPS_X - L.FLANK, y: L.Y_L4, t: "h", label: "PAYROLL MGR" },
    { id: "bbot", x: OPS_X + L.FLANK, y: L.Y_L4, t: "a", label: "BENEFITS BOT" }
  ];
  return { L1, L2, L3, L4, ALL: [L1, ...L2, ...L3, ...L4], ENG_X, OPS_X };
}
const topOf = (n) => n.y - (n.t === "h" ? R_H : R_A);
const botOf = (n) => n.y + (n.t === "h" ? R_H : R_A);

function wrapLabel(t) {
  const w = t.split(/\s+/);
  if (w.length <= 1) return [t];
  if (w.length === 2) return w;
  return [w.slice(0, 2).join(" "), w.slice(2).join(" ")];
}

function NodeLabel({ x, y, text, color, fontSize, wrap, labelOffset, registerBox }) {
  const ref = useRef(null);
  const lines = wrap ? wrapLabel(text) : [text];
  useLayoutEffect(() => {
    if (ref.current) {
      const b = ref.current.getBBox();
      registerBox({ x: b.x - 4, y: b.y - 2, width: b.width + 8, height: b.height + 4 });
    }
  }, [text, x, y, fontSize, wrap, labelOffset]);
  return (
    <text ref={ref} x={x} y={y + labelOffset}
      textAnchor="middle" dominantBaseline="hanging"
      fontFamily='"Geist", ui-sans-serif, system-ui, sans-serif'
      fontSize={fontSize} fontWeight={500} letterSpacing="0.05em"
      style={{ textTransform: "uppercase" }} fill={color}>
      {lines.map((ln, i) => <tspan key={i} x={x} dy={i === 0 ? 0 : fontSize + 2}>{ln}</tspan>)}
    </text>
  );
}

function ChartBody({ L }) {
  const { L1, L2, L3, L4, ALL, ENG_X, OPS_X } = buildGraph(L);
  const [boxes, setBoxes] = useState({});
  const register = (id) => (b) => setBoxes((m) => {
    const p = m[id];
    if (p && p.x === b.x && p.y === b.y && p.width === b.width && p.height === b.height) return m;
    return { ...m, [id]: b };
  });
  return (
    <svg viewBox={`0 0 ${L.W} ${L.H}`} preserveAspectRatio="xMidYMid meet" role="img" aria-hidden="true">
      <line x1={L1.x} y1={botOf(L1)} x2={L1.x} y2={L.Y_BUS1} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L.C[0]} y1={L.Y_BUS1} x2={L.C[L.C.length - 1]} y2={L.Y_BUS1} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      {L2.map((n) => (<line key={`d2-${n.id}`} x1={n.x} y1={L.Y_BUS1} x2={n.x} y2={topOf(n)} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      {L2.map((p, i) => (<line key={`v-${p.id}`} x1={p.x} y1={botOf(p)} x2={p.x} y2={topOf(L3[i])} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      <line x1={ENG_X} y1={botOf(L3[1])} x2={ENG_X} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L4[0].x} y1={L.Y_BUS3} x2={L4[1].x} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={OPS_X} y1={botOf(L3[3])} x2={OPS_X} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      <line x1={L4[2].x} y1={L.Y_BUS3} x2={L4[3].x} y2={L.Y_BUS3} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />
      {L4.map((n) => (<line key={`d4-${n.id}`} x1={n.x} y1={L.Y_BUS3} x2={n.x} y2={topOf(n)} stroke={E_STROKE} strokeOpacity={E_OPACITY} strokeWidth={1} />))}
      {ALL.map((n) => boxes[n.id] && (
        <rect key={`r-${n.id}`} x={boxes[n.id].x} y={boxes[n.id].y} width={boxes[n.id].width} height={boxes[n.id].height} fill="var(--bg-page)" stroke="none" />
      ))}
      {ALL.map((n) => n.t === "h" ? (
        <circle key={n.id} cx={n.x} cy={n.y} r={R_H} fill="var(--text-primary)" />
      ) : (
        <polygon key={n.id} points={`${n.x},${n.y - R_A} ${n.x + R_A},${n.y} ${n.x},${n.y + R_A} ${n.x - R_A},${n.y}`}
          fill="var(--bg-page)" stroke="var(--accent)" strokeWidth={1.25} />
      ))}
      {ALL.map((n) => (
        <NodeLabel key={`l-${n.id}`} x={n.x} y={n.y} text={n.label}
          color={n.t === "h" ? "var(--text-primary)" : "var(--accent)"}
          fontSize={L.FONT} wrap={L.WRAP} labelOffset={L.LABEL_OFFSET}
          registerBox={register(n.id)} />
      ))}
    </svg>
  );
}

function OrgChart() {
  const [narrow, setNarrow] = useState(() =>
    typeof window === "undefined" ? false : window.matchMedia("(max-width: 1023.98px)").matches);
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 1023.98px)");
    const onChange = (e) => setNarrow(e.matches);
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener("change", onChange);
      else mq.removeListener(onChange);
    };
  }, []);
  const L = narrow ? MOBILE : DESKTOP;
  return (
    <aside className="org" aria-label="Permissioned company graph">
      <div className="org-canvas">
        <ChartBody key={narrow ? "narrow" : "wide"} L={L} />
      </div>
      <div className="org-foot">
        <span className="item"><span className="lh" aria-hidden="true"></span>HUMAN</span>
        <span className="item"><span className="la" aria-hidden="true"></span>AGENT</span>
      </div>
    </aside>
  );
}

function Landing({ onRequest }) {
  return (
    <main className="app">
      <section className="hero">
        <div className="container">
          <div className="grid">
            <div className="text">
              <div className="eyebrow">SEED ROUND · 2026</div>
              <h1 className="serif">The AI-native HRIS.</h1>
              <p className="sub">Enterprise HR software for a workforce of humans and agents.</p>
              <p className="body">
                Existing HR systems treat the workforce as a single principal type — the human employee.
                Oneward is a Company OS based on a permissioned company graph that models humans and
                agents on one ledger, with shared primitives for identity, role, access, output, and
                accountability.
              </p>
            </div>
            <OrgChart />
            <div className="actions">
              <button className="btn" onClick={onRequest}>
                Request access to the deck <span className="arrow" aria-hidden="true">→</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  );
}

function Gate({ onHome }) {
  const [form, setForm] = useState({
    name: "", email: "", investor_type: "",
    fund_name: "", fund_website: "", linkedin: "", current_role: "",
    company_size: ""
  });
  const [touched, setTouched] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [globalError, setGlobalError] = useState("");
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const blur = (k) => () => setTouched((t) => ({ ...t, [k]: 1 }));

  const errors = useMemo(() => {
    const e = {};
    if (!form.name.trim())  e.name  = "required";
    if (!form.email.trim()) e.email = "required";
    else if (!/^\S+@\S+\.\S+$/.test(form.email.trim())) e.email = "invalid email";
    if (!form.investor_type) e.investor_type = "required";
    if (form.investor_type === "vc") {
      if (!form.fund_name.trim()) e.fund_name = "required";
      if (!form.fund_website.trim()) e.fund_website = "required";
    }
    if (form.investor_type === "angel") {
      if (!form.linkedin.trim() || !form.linkedin.toLowerCase().includes("linkedin.com/")) e.linkedin = "include linkedin.com/...";
      if (!form.current_role.trim()) e.current_role = "required";
    }
    return e;
  }, [form]);
  const showField = (n) => touched[n] && errors[n];

  const onSubmit = (e) => {
    e.preventDefault();
    setTouched({ name: 1, email: 1, investor_type: 1, fund_name: 1, fund_website: 1, linkedin: 1, current_role: 1 });
    if (Object.keys(errors).length > 0) return;
    setGlobalError("");
    const verdict = evaluateSubmission(form);
    setSubmitting(true);
    submitGate(form, verdict);
    if (verdict.blocked) {
      setSubmitting(false);
      setGlobalError("Access is not available at this time.");
      return;
    }
    window.location.href = buildMailto(form);
    setSubmitted(true);
    setSubmitting(false);
  };

  if (submitted) {
    return (
      <main className="app">
        <section className="gate container">
          <div className="eyebrow">SEED ROUND · 2026 · ACCESS</div>
          <h2 className="serif">Thank you.</h2>
          <p className="thanks-body">
            An email is ready in your mail client, addressed to {CFG.recipient}.
          </p>
          <p className="thanks-body">Send it and we&apos;ll reply with the deck shortly.</p>
          <p className="thanks-fallback">If nothing opened, email {CFG.recipient} directly.</p>
        </section>
      </main>
    );
  }

  return (
    <main className="app">
      <section className="gate container">
        <div className="eyebrow">SEED ROUND · 2026 · ACCESS</div>
        <h2 className="serif">Request access</h2>
        <p className="subcopy">A few details so we know who you are.</p>

        <form onSubmit={onSubmit} noValidate>
          <div className="field">
            <label htmlFor="name">Full name<span className="req">*</span></label>
            <input id="name" className={"input " + (showField("name") ? "error" : "")}
              type="text" autoComplete="name" value={form.name}
              onChange={set("name")} onBlur={blur("name")} />
            {showField("name") && <span className="err">{errors.name}</span>}
          </div>

          <div className="field">
            <label htmlFor="email">Work email<span className="req">*</span></label>
            <input id="email" className={"input " + (showField("email") ? "error" : "")}
              type="email" inputMode="email" autoComplete="email" value={form.email}
              onChange={set("email")} onBlur={blur("email")} />
            {showField("email") && <span className="err">{errors.email}</span>}
          </div>

          <div className="field">
            <label>Investor type<span className="req">*</span></label>
            <div className="radio-group" role="radiogroup" aria-label="Investor type">
              {[{ v: "vc", l: "VC fund" }, { v: "angel", l: "Angel investor" }].map((opt) => (
                <label key={opt.v} className="radio" data-checked={form.investor_type === opt.v}>
                  <input type="radio" name="investor_type" value={opt.v}
                    checked={form.investor_type === opt.v}
                    onChange={(e) => setForm((f) => ({ ...f, investor_type: e.target.value }))} />
                  <span className="mark" aria-hidden="true"></span>
                  <span>{opt.l}</span>
                </label>
              ))}
            </div>
            {showField("investor_type") && <span className="err">{errors.investor_type}</span>}
          </div>

          {form.investor_type === "vc" && (
            <>
              <div className="field">
                <label htmlFor="fund_name">Fund name<span className="req">*</span></label>
                <input id="fund_name" className={"input " + (showField("fund_name") ? "error" : "")}
                  type="text" value={form.fund_name}
                  onChange={set("fund_name")} onBlur={blur("fund_name")} />
                {showField("fund_name") && <span className="err">{errors.fund_name}</span>}
              </div>
              <div className="field">
                <label htmlFor="fund_website">Fund website<span className="req">*</span></label>
                <input id="fund_website" className={"input " + (showField("fund_website") ? "error" : "")}
                  type="text" inputMode="url" autoComplete="url" value={form.fund_website}
                  onChange={set("fund_website")} onBlur={blur("fund_website")} />
                {showField("fund_website") && <span className="err">{errors.fund_website}</span>}
              </div>
            </>
          )}

          {form.investor_type === "angel" && (
            <>
              <div className="field">
                <label htmlFor="linkedin">LinkedIn URL<span className="req">*</span></label>
                <input id="linkedin" className={"input " + (showField("linkedin") ? "error" : "")}
                  type="text" inputMode="url" placeholder="linkedin.com/in/..."
                  value={form.linkedin} onChange={set("linkedin")} onBlur={blur("linkedin")} />
                {showField("linkedin") && <span className="err">{errors.linkedin}</span>}
              </div>
              <div className="field">
                <label htmlFor="current_role">Current role and company<span className="req">*</span></label>
                <input id="current_role" className={"input " + (showField("current_role") ? "error" : "")}
                  type="text" value={form.current_role}
                  onChange={set("current_role")} onBlur={blur("current_role")} />
                {showField("current_role") && <span className="err">{errors.current_role}</span>}
              </div>
            </>
          )}

          <input type="text" name="company_size" value={form.company_size}
            onChange={set("company_size")} tabIndex={-1} autoComplete="off" aria-hidden="true"
            style={{ position: "absolute", left: "-9999px", width: "1px", height: "1px" }} />

          {globalError && (
            <div className="alert" role="alert">
              <span className="tag">Notice</span>
              <span>{globalError}</span>
            </div>
          )}

          <div className="submit-row">
            <button className="btn" type="submit" disabled={submitting}>
              {submitting ? "Submitting…" : <>Continue <span className="arrow" aria-hidden="true">→</span></>}
            </button>
            <button type="button" className="back-link" onClick={onHome}>← Back</button>
          </div>
          <p className="micro">Your information is used only to share the deck and follow up directly.</p>
        </form>
      </section>
    </main>
  );
}

function App() {
  const [view, setView] = useState("landing");
  useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);
  return (
    <div className="frame">
      <Header onHome={() => setView("landing")} />
      {view === "landing" && <Landing onRequest={() => setView("gate")} />}
      {view === "gate"    && <Gate    onHome={()    => setView("landing")} />}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
